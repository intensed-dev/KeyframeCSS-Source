<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="wrapper">

  <!-- Sidebar -->
  <aside class="sidebar">
    {% include sidebar.html %}
  </aside>

  <!-- Content -->
  <main class="content">
    <h1>{{ page.title }}</h1>
    {{ content }}

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
      {% if page.previous %}
        <a href="{{ page.previous.url }}">⬅ Previous</a>
      {% endif %}

      {% if page.next %}
        <a href="{{ page.next.url }}">Next ➡</a>
      {% endif %}
    </div>

    <!-- Edit Button -->
    <div class="edit">
      <a href="{{ site.github.repository_url }}/edit/main/{{ page.path }}">
        ✏️ Edit this page
      </a>
    </div>

  </main>

</div>

</body>
</html>
